<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Oficina 39 - Débitos em Aberto</title>

    <link rel="stylesheet" href="/static/css/global.css">
    <link rel="stylesheet" href="/static/css/components/buttons.css">
    <link rel="stylesheet" href="/static/css/components/forms.css">
    <link rel="stylesheet" href="/static/css/components/tables.css">
    <link rel="stylesheet" href="/static/css/pages/debitos.css">
</head>
<body class="pagina-debitos">
    <div class="container debitos-container">
        <div class="cabecalho-duplo">
            <div>
                <h1 class="titulo-debitos">Débitos em Aberto</h1>
                <p class="subtitulo-debitos">Clientes com pagamento pendente ou parcial.</p>
            </div>
            <div class="acoes-debitos">
                <a class="btn btn-voltar" href="/">Voltar</a>
            </div>
        </div>

        <div class="table-container">
            <table class="tabela-debitos">
                <thead>
                    <tr>
                        <th>OS</th>
                        <th>Cliente</th>
                        <th>Veículo</th>
                        <th>Total</th>
                        <th>Pago</th>
                        <th>Saldo</th>
                        <th>Status financeiro</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaDebitos">
                    <tr>
                        <td colspan="8" class="text-center mensagem-carregando">Carregando débitos...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="/static/js/ui.js"></script>
    <script src="/static/js/debitos.js"></script>
    <script src="/static/js/tema.js"></script>
</body>
</html>
