<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Oficina 39 - Cadastro de Cliente</title>
    
    <!-- CSS GLOBAL -->
    <link rel="stylesheet" href="/static/css/global.css">
    
    <!-- COMPONENTS -->
    <link rel="stylesheet" href="/static/css/components/buttons.css">
    <link rel="stylesheet" href="/static/css/components/forms.css">
    
    <!-- CSS ESPECÍFICO DA PÁGINA -->
    <link rel="stylesheet" href="/static/css/pages/cadastroCliente.css">
</head>
<body class="pagina-cadastro-cliente">

    <!-- CONTAINER PRINCIPAL -->
    <div class="container cliente-container">
        <!-- CABEÇALHO COM BOTÃO VOLTAR -->
        <div class="cabecalho-duplo">
            <h1 class="titulo-pagina">📋 Cadastro de Cliente</h1>
            <div class="acoes-cabecalho">
                <button class="btn btn-voltar" onclick="window.location.href='/'">↩ Voltar</button>
            </div>
        </div>

        <!-- SEÇÃO DADOS PESSOAIS -->
        <div class="form-section">
            <h3 class="section-titulo">👤 Dados Pessoais</h3>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="nome_cliente">Nome Completo *</label>
                    <input type="text" id="nome_cliente" placeholder="Digite o nome completo">
                </div>
                
                <div class="form-group">
                    <label for="cpf">CPF *</label>
                    <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14">
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="telefone">Telefone *</label>
                    <input type="text" id="telefone" placeholder="(11) 99999-9999" maxlength="15">
                </div>
                
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="cliente@email.com">
                </div>
            </div>
        </div>

        <!-- SEÇÃO ENDEREÇO -->
        <div class="form-section">
            <h3 class="section-titulo">📍 Endereço</h3>
            
            <div class="form-row">
                <div class="form-group endereco-full">
                    <label for="endereco">Endereço</label>
                    <input type="text" id="endereco" placeholder="Rua, número, complemento">
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="cidade">Cidade</label>
                    <input type="text" id="cidade" placeholder="Digite a cidade">
                </div>
                
                <div class="form-group">
                    <label for="estado">Estado</label>
                    <input type="text" id="estado" placeholder="UF" maxlength="2">
                </div>
                
                <div class="form-group">
                    <label for="cep">CEP</label>
                    <input type="text" id="cep" placeholder="00000-000" maxlength="9">
                </div>
            </div>
        </div>

        <!-- SEÇÃO VEÍCULO -->
        <div class="form-section">
            <h3 class="section-titulo">🚗 Veículo</h3>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="fabricante">Marca</label>
                    <input type="text" id="fabricante" placeholder="Ex: Volkswagen, Fiat, Ford">
                </div>
                
                <div class="form-group">
                    <label for="modelo">Modelo</label>
                    <input type="text" id="modelo" placeholder="Ex: Gol, Onix, Fiesta">
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="placa">Placa</label>
                    <input type="text" id="placa" placeholder="ABC-1234" maxlength="8">
                </div>
                
                <div class="form-group">
                    <label for="ano">Ano</label>
                    <input type="text" id="ano" placeholder="2024" maxlength="4">
                </div>
                
                <div class="form-group">
                    <label for="cor">Cor</label>
                    <input type="text" id="cor" placeholder="Ex: Preto, Branco, Prata">
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="motor">Motor</label>
                    <input type="text" id="motor" placeholder="Ex: 1.0, 1.4, 2.0">
                </div>
                
                <div class="form-group">
                    <label for="combustivel">Combustível</label>
                    <input type="text" id="combustivel" placeholder="Ex: Gasolina, Flex, Diesel">
                </div>
                
                <div class="form-group">
                    <label for="tanque">Tanque (%)</label>
                    <input type="text" id="tanque" placeholder="Ex: 1/4, 1/2, 3/4">
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="km">KM</label>
                    <input type="text" id="km" placeholder="Ex: 50000">
                </div>
                
                <div class="form-group">
                    <label for="direcao">Direção</label>
                    <input type="text" id="direcao" placeholder="Ex: Hidráulica, Elétrica">
                </div>
                
                <div class="form-group">
                    <label for="ar">Ar Condicionado</label>
                    <input type="text" id="ar" placeholder="Sim / Não">
                </div>
            </div>
        </div>

        <!-- BOTÕES -->
        <div class="button-group button-group-final">
            <button class="btn btn-cancelar btn-final" onclick="cancelar()">✕ Cancelar</button>
            <button class="btn btn-salvar btn-final" onclick="salvar()">✓ Salvar Cliente</button>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="/static/js/ui.js"></script>
    <script src="/static/js/cadastroCliente.js"></script>
    <script src="/static/js/tema.js"></script>
</body>
</html>
